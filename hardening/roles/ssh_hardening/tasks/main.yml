---
# hardening/roles/ssh_hardening/tasks/main.yml
# Tasks to secure the SSH daemon configuration against unauthorized access

- name: Ensure root login via SSH is disabled (CIS Benchmark)
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
    state: present
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart SSH

- name: Ensure empty passwords are not permitted (CIS Benchmark)
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitEmptyPasswords'
    line: 'PermitEmptyPasswords no'
    state: present
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart SSH
