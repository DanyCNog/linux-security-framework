---
# hardening/roles/firewall/tasks/main.yml
# Tasks to configure and enable the Uncomplicated Firewall (UFW)

- name: Ensure the UFW package is installed
  apt:
    name: ufw
    state: present
    update_cache: yes

- name: Allow incoming SSH traffic (Critical to prevent administrative lockouts)
  ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Enable the firewall with a default deny policy for incoming traffic
  ufw:
    state: enabled
    direction: incoming
    policy: deny
